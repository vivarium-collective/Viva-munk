[project]
name = "multi-cell"
version = "0.0.1"
description = "multi-cell simulations with pymunk 2d physics"
readme = "README.md"
requires-python = ">=3.7"
authors = [
  {name = "Eran Agmon"},
  {name = "Ryan Spangler"}
]
dependencies = [
    "process-bigraph",
    "bigraph-viz",
    "pymunk",

    "pytest",
    "ipdb",
    "setuptools",
    "twine>=4.0.2",
]

[tool.setuptools]
packages = [
    "multi_cell",
    "multi_cell.processes",
    "multi_cell.experiments",
    "multi_cell.plots",
]
