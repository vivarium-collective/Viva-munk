name: Regenerate Report

on:
  push:
    branches: [main]
    paths:
      - 'multi_cell/**'
      - 'pyproject.toml'
      - '.github/workflows/regenerate-report.yml'
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write

concurrency:
  group: "regenerate-report"
  cancel-in-progress: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Install bigraph-schema and process-bigraph from the api branches
          pip install git+https://github.com/vivarium-collective/bigraph-schema.git@api
          pip install git+https://github.com/vivarium-collective/process-bigraph.git@api
          pip install bigraph-viz pymunk numpy matplotlib pillow plum-dispatch
          pip install -e .

      - name: Regenerate experiments report
        env:
          MPLBACKEND: Agg
        run: |
          python -m multi_cell.experiments.test_suite --output out --no-open

      - name: Copy outputs to doc/
        run: |
          mkdir -p doc
          cp out/report.html doc/index.html
          cp out/*.gif doc/ 2>/dev/null || true
          cp out/*_viz.png doc/ 2>/dev/null || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add doc/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "regenerate report from ${GITHUB_SHA::8}"
            git push
          fi
